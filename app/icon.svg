<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B1A68"/>
      <stop offset="100%" stop-color="#2D2BE0"/>
    </linearGradient>
    <!-- Mask punches the inner counter of the 'a' ring -->
    <mask id="hole">
      <rect width="32" height="32" fill="white"/>
      <circle cx="14" cy="20" r="3.4" fill="black"/>
    </mask>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Macron bar (the distinguishing ā mark) -->
  <rect x="8" y="4" width="16" height="2.5" rx="1.25" fill="white"/>

  <!-- Circular 'a' ring (outer circle minus inner counter) -->
  <circle cx="14" cy="20" r="7" fill="white" mask="url(#hole)"/>

  <!-- Right vertical stem of the 'a' -->
  <rect x="19.5" y="13.5" width="3.5" height="13" rx="1.75" fill="white"/>
</svg>
